version: "3.8"

# Phase B deployment. Same compose runs locally (Phase B validation
# with SLOT_CONNECTOR=sim) and in production (SLOT_CONNECTOR=mt5 +
# akron-mt5-base sidecar — Phase B-real).

services:
  slot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/alxvarp/akroncloud-slot:0.3.0-tcp-bridge-v33
    container_name: akroncloud-slot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Phase C / Ruta B1 — direct TCP socket MQL5 ↔ slot.
      # v2: MT5 connector also rewritten to TCP (was ZMQ).
      - SLOT_BRIDGE=tcp
    ports:
      - "0.0.0.0:7777:7777"   # Slot API (REST + WS) + mobile wrapper
      # KasmVNC :3000 was previously exposed - that is the openbox
      # desktop + xterm shell the attacker used to manually launch the
      # xmrig Monero miner. Now bound to 127.0.0.1 only; reach it
      # via SSH tunnel. The slot uses 3000 internally only via
      # src/web/mt5-ws-proxy.ts -> ws://127.0.0.1:3000/websockify.
      - "127.0.0.1:3000:3000" # KasmVNC desktop - SSH tunnel ONLY, NOT public
      - "127.0.0.1:7778:7778"  # MT5 ↔ slot TCP socket (Phase C / Ruta B1)
    volumes:
      - slot-state:/var/lib/akron-slot
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7777/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 180s   # 3 min for first-boot (start.sh installs wine-mono + Python + bridge)
      retries: 10

volumes:
  slot-state:
