version: "3.8"

# Phase B deployment. Same compose runs locally (Phase B validation
# with SLOT_CONNECTOR=sim) and in production (SLOT_CONNECTOR=mt5 +
# akron-mt5-base sidecar — Phase B-real).

services:
  slot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/alxvarp/akroncloud-slot:0.2.0
    container_name: akroncloud-slot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "0.0.0.0:7777:7777"   # Temp dev exposure: reachable at http://<host>:7777. Move back to 127.0.0.1 + NetBird for prod (Phase C).
    volumes:
      - slot-state:/var/lib/akron-slot
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7777/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  slot-state:
